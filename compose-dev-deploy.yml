# Used by GitHub Actions for dev deployment - uses pre-built image from GHCR
# Local development: use compose-dev.yml (builds from source)
services:
  mongodb-dev:
    image: mongo:8.0
    container_name: surespot-mongodb-dev
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: surespot
      MONGO_INITDB_ROOT_PASSWORD: surespot_dev_password
      MONGO_INITDB_DATABASE: surespot
    volumes:
      - mongodb_dev_data:/data/db
      - mongodb_dev_config:/data/configdb
    networks:
      - surespot-dev-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/surespot --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis-dev:
    image: redis:latest
    container_name: surespot-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass surespot_redis_password
    volumes:
      - redis_dev_data:/data
    networks:
      - surespot-dev-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'surespot_redis_password', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE}
    container_name: surespot-app-dev
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGODB_URI: mongodb://surespot:surespot_dev_password@mongodb-dev:27017/surespot?authSource=admin
      REDIS_HOST: redis-dev
      REDIS_PORT: 6379
      REDIS_PASSWORD: surespot_redis_password
    depends_on:
      mongodb-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    networks:
      - surespot-dev-network

volumes:
  mongodb_dev_data:
    driver: local
  mongodb_dev_config:
    driver: local
  redis_dev_data:
    driver: local

networks:
  surespot-dev-network:
    driver: bridge
