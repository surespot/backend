services:
  mongodb-keyfile-setup:
    image: mongo:8.0
    container_name: surespot-mongodb-keyfile-setup
    restart: 'no'
    volumes:
      - mongodb_keyfile:/keyfile
    entrypoint: >
      bash -c "
      if [ ! -f /keyfile/mongodb-keyfile ]; then
        openssl rand -base64 756 > /keyfile/mongodb-keyfile;
        chmod 400 /keyfile/mongodb-keyfile;
        chown 999:999 /keyfile/mongodb-keyfile;
        echo 'Keyfile generated successfully';
      else
        echo 'Keyfile already exists';
      fi
      "
    networks:
      - surespot-network

  mongodb:
    image: mongo:8.0
    container_name: surespot-mongodb
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all --keyFile /data/mongodb-keyfile
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: surespot
      MONGO_INITDB_ROOT_PASSWORD: surespot_dev_password
      MONGO_INITDB_DATABASE: surespot
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - mongodb_keyfile:/data:ro
    depends_on:
      mongodb-keyfile-setup:
        condition: service_completed_successfully
    networks:
      - surespot-network
    healthcheck:
      test: |
        mongosh --username surespot --password surespot_dev_password --authenticationDatabase admin --quiet --eval "
        try {
          var status = rs.status();
          if (status.ok === 1 && status.members && status.members.length > 0) {
            quit(0);
          }
        } catch(e) {
          if (e.codeName === 'NotYetInitialized') {
            quit(1);
          }
        }
        quit(1);
        "
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  mongodb-init:
    image: mongo:8.0
    container_name: surespot-mongodb-init
    restart: 'no'
    depends_on:
      mongodb-keyfile-setup:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
    networks:
      - surespot-network
    entrypoint: >
      bash -c "
      sleep 5 &&
      mongosh --host mongodb --username surespot --password surespot_dev_password --authenticationDatabase admin --eval '
      try {
        rs.status();
        print(\"Replica set already initialized\");
      } catch(e) {
        if (e.codeName === \"NotYetInitialized\") {
          rs.initiate({
            _id: \"rs0\",
            members: [{ _id: 0, host: \"127.0.0.1:27017\" }]
          });
          print(\"Replica set initialized\");
        }
      }
      '
      "

  redis:
    image: redis:latest
    container_name: surespot-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass surespot_redis_password
    volumes:
      - redis_data:/data
    networks:
      - surespot-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'surespot_redis_password', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

