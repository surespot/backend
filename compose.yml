services:
  mongodb:
    image: mongo:8.0
    container_name: surespot-mongodb
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: surespot
      MONGO_INITDB_ROOT_PASSWORD: surespot_dev_password
      MONGO_INITDB_DATABASE: surespot
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - surespot-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/surespot --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-init:
    image: mongo:8.0
    container_name: surespot-mongodb-init
    restart: 'no'
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - surespot-network
    entrypoint: >
      mongosh --host mongodb --eval
      "try { rs.status() } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] }) }"

  redis:
    image: redis:latest
    container_name: surespot-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass surespot_redis_password
    volumes:
      - redis_data:/data
    networks:
      - surespot-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'surespot_redis_password', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: surespot-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./monitoring/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - surespot-network

  loki:
    image: grafana/loki:latest
    container_name: surespot-loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    volumes:
      - loki_data:/loki
    networks:
      - surespot-network

  grafana:
    image: grafana/grafana:latest
    container_name: surespot-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: changeme
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - surespot-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local

networks:
  surespot-network:
    driver: bridge
